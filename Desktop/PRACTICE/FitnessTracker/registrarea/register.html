<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Înregistrare</title>
  <link rel="stylesheet" href="register.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif; /* Aplică fontul Poppins */
    }
  </style>
</head>
<body>
  <div class="register-container">
    <h2 style="text-align: center;">Înregistrarea</h2>
    <form id="registerForm">
      <input type="text" id="username" placeholder="Nume utilizator" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Parolă" required>
      <button type="submit" style="font-size: large;font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif ;">Înregistrează-te</button>
      <p id="error" class="error-message"></p>
    </form>
    <p style="text-align: center;">Ai deja un cont? <a href="../autentificarea/auth.html" style="color: blue;">Autentifică-te</a></p>
  </div>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async function (event) {
      event.preventDefault();

      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorElement = document.getElementById('error');

      try {
        let users = JSON.parse(localStorage.getItem('users')) || [];

        if (users.some(user => user.email === email)) {
          errorElement.textContent = 'Email-ul este deja utilizat.';
          errorElement.style.display = 'block';
          return;
        }

        const newUser = { username, email, password };
        users.push(newUser);
        localStorage.setItem('users', JSON.stringify(users));

        alert('Înregistrarea a fost realizată cu succes!');
        window.location.href = "../autentificarea/auth.html";
      } catch (error) {
        console.error('Eroare la înregistrare:', error);
        errorElement.textContent = 'Eroare la înregistrare.';
        errorElement.style.display = 'block';
      }
    });
  </script>
</body>
</html>
