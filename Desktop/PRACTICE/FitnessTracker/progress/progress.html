<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitnessTracker - Progress Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #121212;
      color: #ffffff;
    }

    #progressContainer {
      margin: 20px auto;
      padding: 20px;
      max-width: 900px;
      background-color: #1f1f1f;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      position: relative;
    }

    #closeProgressContainer {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #ffffff;
      transition: color 0.3s;
    }

    #closeProgressContainer:hover {
      color: #ff0000;
    }

    .section {
      margin: 40px auto;
      padding: 20px;
      max-width: 900px;
      background: #1a1a1a;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 191, 255, 0.2);
    }

    .section h2 {
      color: #00bfff;
      text-align: center;
    }

    #progressChart {
      margin-top: 20px;
      width: 100%;
      height: 400px;
    }
  </style>
</head>
<body>
  <div id="progressContainer">
    <button id="closeProgressContainer">✖</button>
    <section class="section">
      <h2>📈 Progress Tracker</h2>
      <canvas id="progressChart"></canvas>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const ctx = document.getElementById('progressChart').getContext('2d');

      // Obține datele utilizatorului curent
      const userData = JSON.parse(localStorage.getItem('userData'));
      if (!userData) {
        alert('Trebuie să fii autentificat pentru a vizualiza progresul.');
        return;
      }

      // Obține antrenamentele salvate pentru utilizatorul curent
      const savedTrainings = JSON.parse(localStorage.getItem(`trainings_${userData.email}`)) || [];

      // Gruparea antrenamentelor pe luni
      const progressData = {
        labels: [
          'Ianuarie', 'Februarie', 'Martie', 'Aprilie', 'Mai', 'Iunie',
          'Iulie', 'August', 'Septembrie', 'Octombrie', 'Noiembrie', 'Decembrie'
        ],
        data: Array(12).fill(0) // Începem cu 0 pentru fiecare lună
      };

      savedTrainings.forEach(training => {
        if (!training.date) {
          console.warn('Antrenamentul nu are o dată validă:', training);
          return; // Ignoră antrenamentele fără dată
        }

        const trainingDate = new Date(training.date); // Utilizează data salvată
        if (isNaN(trainingDate)) {
          console.warn('Data antrenamentului este invalidă:', training.date);
          return; // Ignoră antrenamentele cu dată invalidă
        }

        const month = trainingDate.getMonth(); // Obține luna (0-11)
        if (progressData.data[month] < 15) { // Limitează numărul maxim de antrenamente la 15
          progressData.data[month]++;
        }
      });

      // Adaugă cele două antrenamente deja salvate
      if (progressData.data[0] < 15) progressData.data[0]++;
      if (progressData.data[1] < 15) progressData.data[1]++;

      // Salvează progresul în localStorage
      localStorage.setItem('progressData', JSON.stringify(progressData));

      // Inițializează graficul
      const progressChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: progressData.labels,
          datasets: [{
            label: 'Numărul de Antrenamente',
            data: progressData.data,
            backgroundColor: 'rgba(0, 191, 255, 0.5)',
            borderColor: '#00bfff',
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              display: true,
              labels: {
                color: '#ffffff'
              }
            }
          },
          scales: {
            x: {
              ticks: {
                color: '#ffffff'
              }
            },
            y: {
              ticks: {
                color: '#ffffff',
                stepSize: 1, // Asigură afișarea numerelor întregi
                max: 15 // Limitează afișarea la 15 antrenamente
              },
              title: {
                display: true,
                text: 'Număr Antrenamente',
                color: '#ffffff'
              }
            }
          }
        }
      });

      // Butonul de închidere
      const closeButton = document.getElementById('closeProgressContainer');
      if (closeButton) {
        closeButton.addEventListener('click', function () {
          const contentFrame = window.parent.document.getElementById('contentFrame');
          if (contentFrame) {
            contentFrame.src = ''; // Golește iframe-ul
          } else {
            console.error('Iframe-ul nu a fost găsit.');
          }
        });
      } else {
        console.error('Butonul de închidere nu a fost găsit.');
      }
    });
  </script>
</body>
</html>
