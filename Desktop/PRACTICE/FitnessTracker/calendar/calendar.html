<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitnessTracker - Calendarul Activității Fizice</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #121212;
      color: #ffffff;
    }

    #calendarContainer {
      margin: 20px auto;
      padding: 20px;
      max-width: 900px;
      background-color: #1f1f1f;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      position: relative;
    }

    #calendarContent {
      margin-top: 20px;
    }

    #closeCalendarContainer {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #ffffff;
      transition: color 0.3s;
    }

    #closeCalendarContainer:hover {
      color: #ff0000;
    }

    .section {
      margin: 40px auto;
      padding: 20px;
      max-width: 900px;
      background: #1a1a1a;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 191, 255, 0.2);
    }

    .section h2 {
      color: #00bfff;
      text-align: center;
    }

    #calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      margin-top: 20px;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      text-align: center;
      font-weight: bold;
      color: #00bfff;
      margin-bottom: 10px;
    }

    .day {
      background-color: #121212;
      border: 1px solid #00bfff;
      padding: 15px;
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .day:hover {
      background-color: #004466;
    }

    .exercise {
      margin-top: 8px;
      font-size: 0.85em;
      color: #00ffcc;
    }

    #monthYear {
      text-align: center;
      font-size: 1.3em;
      margin-bottom: 10px;
      color: #00bfff;
    }

    /* Stilizare pentru modal */
    #modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #1f1f1f;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
      z-index: 1000;
      width: 300px;
    }

    #modal h3 {
      color: #00bfff;
      text-align: center;
      margin-bottom: 15px;
    }

    #modal input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #00bfff;
      border-radius: 5px;
      background-color: #121212;
      color: #ffffff;
    }

    #modal button {
      width: 100%;
      padding: 10px;
      background-color: #00bfff;
      border: none;
      border-radius: 5px;
      color: #ffffff;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    #modal button:hover {
      background-color: #0088cc;
    }

    #modalOverlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 999;
    }
  </style>
</head>
<body>
  <div id="calendarContainer">
    <button id="closeCalendarContainer">✖</button>
    <section class="section">
      <h2>📅 Calendarul Activității Fizice</h2>
      <div id="monthYear"></div>
      <div class="weekdays">
        <span>Luni</span>
        <span>Marți</span>
        <span>Miercuri</span>
        <span>Joi</span>
        <span>Vineri</span>
        <span>Sâmbătă</span>
        <span>Duminică</span>
      </div>
      <div id="calendar"></div>
    </section>
  </div>

  <!-- Modal personalizat -->
  <div id="modalOverlay"></div>
  <div id="modal">
    <h3>Tipul Antrenamentului</h3>
    <input type="text" id="trainingTypeInput" placeholder="Ex: Forță, Aerobe, etc.">
    <button id="saveTrainingType">Salvează</button>
  </div>

  <script>
    const calendarContainer = document.getElementById("calendar");
    const monthYearDisplay = document.getElementById("monthYear");
    const modal = document.getElementById("modal");
    const modalOverlay = document.getElementById("modalOverlay");
    const trainingTypeInput = document.getElementById("trainingTypeInput");
    const saveTrainingTypeButton = document.getElementById("saveTrainingType");

    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth();

    const monthNames = ["Ianuarie", "Februarie", "Martie", "Aprilie", "Mai", "Iunie", "Iulie", "August", "Septembrie", "Octombrie", "Noiembrie", "Decembrie"];
    monthYearDisplay.textContent = `${monthNames[month]} ${year}`;

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    const calendarData = JSON.parse(localStorage.getItem("calendarSimple")) || {};
    let selectedDateKey = null;

    function createCalendar() {
      calendarContainer.innerHTML = "";

      for (let i = 0; i < (firstDay === 0 ? 6 : firstDay - 1); i++) {
        const empty = document.createElement("div");
        calendarContainer.appendChild(empty);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateKey = `${year}-${month + 1}-${day}`;

        const cell = document.createElement("div");
        cell.className = "day";
        cell.textContent = day;

        const type = calendarData[dateKey] || "Odihnă";
        const ex = document.createElement("div");
        ex.className = "exercise";
        ex.textContent = type;
        cell.appendChild(ex);

        cell.addEventListener("click", () => {
          selectedDateKey = dateKey;
          trainingTypeInput.value = calendarData[dateKey] || "";
          openModal();
        });

        calendarContainer.appendChild(cell);
      }
    }

    function openModal() {
      modal.style.display = "block";
      modalOverlay.style.display = "block";
    }

    function closeModal() {
      modal.style.display = "none";
      modalOverlay.style.display = "none";
    }

    saveTrainingTypeButton.addEventListener("click", () => {
      const type = trainingTypeInput.value.trim() || "Odihnă";
      calendarData[selectedDateKey] = type;
      localStorage.setItem("calendarSimple", JSON.stringify(calendarData));
      createCalendar();
      closeModal();
    });

    modalOverlay.addEventListener("click", closeModal);

    createCalendar();

    // Butonul de închidere
    const closeButton = document.getElementById('closeCalendarContainer');
    if (closeButton) {
      closeButton.addEventListener('click', function () {
        const contentFrame = window.parent.document.getElementById('contentFrame');
        if (contentFrame) {
          contentFrame.src = ''; // Golește iframe-ul
        } else {
          console.error('Iframe-ul nu a fost găsit.');
        }
      });
    } else {
      console.error('Butonul de închidere nu a fost găsit.');
    }
  </script>
</body>
</html>
